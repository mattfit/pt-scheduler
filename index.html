function datesInMonth(year, month, weekday){
  const total = new Date(year,month+1,0).getDate();
  const res=[];
  for(let d=1;d<=total;d++)
    if(new Date(year,month,d).getDay()===weekday) res.push(d);
  return res;
}

function buildGrid(year, month){
  const first = new Date(year,month,1).getDay();
  const total = new Date(year,month+1,0).getDate();
  const cells=[];
  for(let i=0;i<first;i++) cells.push(null);
  for(let d=1;d<=total;d++) cells.push(d);
  while(cells.length%7!==0) cells.push(null);
  return cells;
}

    dates:`${f(d)}/${f(e)}`,details:`$${s.rate}/session`})}`;
}

// ─── BILLING ENGINE ───────────────────────────────────────────────────────────
//
// EVERY MONTH:
//   Base bill = sessions this month × rate  (FIXED, never changes)
//
// ADJUSTMENTS come from PREVIOUS month's rollover activity only:
//   rollover_you      → −rate each
//   rollover_cli      → −rate each
//   resched_rollover  → +rate each (makeup for a rollover)
//   completed         → no effect
//   late_cancel       → no effect
//   resched_late      → no effect
//
// Bill never goes below $0.

function getSessionsForMonth(client, year, month){
  return (client.sessions||[]).filter(s=>{
    const d=new Date(s.date);
    return d.getFullYear()===year && d.getMonth()===month;
  });
}

function countScheduledSessions(client, year, month){
  return (client.trainDays||[]).reduce(
    (sum,td)=>sum+datesInMonth(year,month,td.wd).length, 0);
}

function isFirstMonth(client, year, month){
  if(!client.startDate) return false;
  const s=new Date(client.startDate);
  return s.getFullYear()===year && s.getMonth()===month;
}

function computeBill(client, year, month){
  if(!client.startDate) return {bill:0, baseBill:0, adjustment:0, breakdown:[], isFirst:false};
  const start=new Date(client.startDate);
  if(year<start.getFullYear()||(year===start.getFullYear()&&month<start.getMonth()))
    return {bill:0, baseBill:0, adjustment:0, breakdown:[], isFirst:false};

  const rate     = client.rate||40;
  const count    = countScheduledSessions(client,year,month);
  const baseBill = count * rate;
  const first    = isFirstMonth(client,year,month);

  // Get previous month's sessions for adjustment
  const prev  = new Date(year,month-1,1);
  const prevY = prev.getFullYear();
  const prevM = prev.getMonth();
  const prevSess = first ? [] : getSessionsForMonth(client,prevY,prevM);

  let adjustment = 0;
  const breakdown = [];

  const rollYou  = prevSess.filter(s=>s.status==="rollover_you");
  const rollCli  = prevSess.filter(s=>s.status==="rollover_cli");
  const reschedR = prevSess.filter(s=>s.status==="resched_rollover");

  if(rollYou.length){
    const amt=rollYou.length*rate;
    adjustment-=amt;
    breakdown.push({label:`${rollYou.length} Rollover (You)`,amt,sign:"−",color:"#f59e0b"});
  }
  if(rollCli.length){
    const amt=rollCli.length*rate;
    adjustment-=amt;
    breakdown.push({label:`${rollCli.length} Rollover (Client)`,amt,sign:"−",color:"#a78bfa"});
  }
  if(reschedR.length){
    const amt=reschedR.length*rate;
    adjustment+=amt;
    breakdown.push({label:`${reschedR.length} Rescheduled Rollover`,amt,sign:"+",color:"#34d399"});
  }

  const bill=Math.max(0, baseBill+adjustment);
  return {bill, baseBill, adjustment, breakdown, isFirst:first,
          prevMonthName:first?"":MONTHS[prevM]};
}

function getTotalEarned(client){
  return (client.confirmedPayments||[]).reduce((s,p)=>s+p.amount,0);
}

// ─── MONTH LOCKING ────────────────────────────────────────────────────────────
// A month is locked if it is before the current month.
// User can unlock a specific month manually.

function isMonthLocked(client, year, month){
  const now=new Date();
  const curY=now.getFullYear(), curM=now.getMonth();
  // Past month = locked by default unless manually unlocked
  const isPast = year<curY||(year===curY&&month<curM);
  if(!isPast) return false;
  const key=ymKey(year,month);
  // If user explicitly unlocked it, it's not locked
  return !(client.unlockedMonths||[]).includes(key);
}

// ─── AUTO-SESSION SYNC ────────────────────────────────────────────────────────
// Only syncs for current/future months — never touches past months
function syncSessions(client, year, month){
  if(!client.startDate) return client;
  const start=new Date(client.startDate);
  if(year<start.getFullYear()||(year===start.getFullYear()&&month<start.getMonth()))
    return client;

  // Never auto-sync past months (they are locked)
  const now=new Date();
  const curY=now.getFullYear(), curM=now.getMonth();
  const isPast=year<curY||(year===curY&&month<curM);
  if(isPast) return client;

  let sessions=[...(client.sessions||[])];

  // Remove auto sessions for this month whose weekday was removed
  sessions=sessions.filter(s=>{
    if(s.source!=="auto") return true;
    const d=new Date(s.date);
    if(d.getMonth()!==month||d.getFullYear()!==year) return true;
    return (client.trainDays||[]).some(td=>td.wd===s.wd);
  });

  // Add missing auto sessions
  (client.trainDays||[]).forEach(td=>{
    datesInMonth(year,month,td.wd).forEach(day=>{
      const dateStr=makeDateStr(year,month,day);
      if(dateStr<client.startDate) return;
      const exists=sessions.some(s=>
        s.date===dateStr&&s.source==="auto"&&s.wd===td.wd);
      if(!exists){
        sessions.push({
          id:uid(),date:dateStr,time:td.time,note:"",
          status:"scheduled",rate:client.rate,source:"auto",wd:td.wd
        });
      }
    });
  });

  sessions.sort((a,b)=>a.date.localeCompare(b.date));
  return {...client,sessions};
}

    setClients(cs=>cs.map(c=>syncSessions(c,viewYr,viewMo)));
  },[viewYr,viewMo]);

  const cl  = useMemo(()=>clients.find(c=>c.id===activeId),[clients,activeId]);
  const upd = (id,fn)=>setClients(cs=>cs.map(c=>c.id===id?fn(c):c));

  // ── Training days ──
  function toggleDay(wd){
    upd(activeId,c=>{
      const has=(c.trainDays||[]).some(td=>td.wd===wd);
      const trainDays=has
        ?(c.trainDays||[]).filter(td=>td.wd!==wd)
        :[...(c.trainDays||[]),{wd,time:"09:00"}].sort((a,b)=>a.wd-b.wd);
      // Only sync current/future months
      return syncSessions({...c,trainDays},viewYr,viewMo);
    });
  }

  function setDayTime(wd,time){
    upd(activeId,c=>{
      const trainDays=(c.trainDays||[]).map(td=>td.wd===wd?{...td,time}:td);
      // Only update scheduled auto sessions in current/future months
      const now=new Date();
      const sessions=(c.sessions||[]).map(s=>{
        const d=new Date(s.date);
        const isPast=d.getFullYear()<now.getFullYear()||
          (d.getFullYear()===now.getFullYear()&&d.getMonth()<now.getMonth());
        if(isPast) return s;
        return s.source==="auto"&&s.wd===wd&&s.status==="scheduled"?{...s,time}:s;
      });
      return{...c,trainDays,sessions};
    });
  }

  // ── Session status ──
  function setStatus(sid, status){
    upd(activeId,c=>({
      ...c,
      sessions:(c.sessions||[]).map(s=>s.id===sid?{...s,status}:s)
    }));
  }

  // ── Add session from modal ──
  function confirmAdd(){
    if(!mDate||!cl) return;
    const s={
      id:uid(),date:mDate,time:mTime,note:mNote,
      status:"scheduled",rate:cl.rate,source:modal.type
    };
    upd(activeId,c=>({
      ...c,
      sessions:[...(c.sessions||[]),s].sort((a,b)=>a.date.localeCompare(b.date))
    }));
    setModal(null);setMDate("");setMTime("09:00");setMNote("");
  }

  function delSession(sid){
    upd(activeId,c=>({...c,sessions:(c.sessions||[]).filter(s=>s.id!==sid)}));
  }

  // ── Lock/Unlock month ──
  function unlockMonth(year,month){
    const key=ymKey(year,month);
    upd(activeId,c=>({
      ...c,
      unlockedMonths:[...(c.unlockedMonths||[]).filter(k=>k!==key),key]
    }));
  }
  function lockMonth(year,month){
    const key=ymKey(year,month);
    upd(activeId,c=>({
      ...c,
      unlockedMonths:(c.unlockedMonths||[]).filter(k=>k!==key)
    }));
  }

  // ── Confirm payment ──
  function confirmPayment(amount){
    if(amount<=0) return;
    const p={id:uid(),year:viewYr,month:viewMo,amount,
             confirmedAt:new Date().toISOString()};
    upd(activeId,c=>{
      const prev=(c.confirmedPayments||[]).filter(
        x=>!(x.year===viewYr&&x.month===viewMo));
      return{...c,confirmedPayments:[...prev,p]};
    });
  }

  // ── Client management ──
  function addClient(){
    if(!ncName.trim()||!ncStart) return;
    const nc={
      id:uid(),name:ncName.trim(),rate:ncRate,
      startDate:ncStart,trainDays:[],sessions:[],
      confirmedPayments:[],unlockedMonths:[]
    };
    setClients(cs=>[...cs,nc]);
    setActiveId(nc.id);
    setNcName("");setNcRate(40);setNcStart("");
    setShowNC(false);setTab("schedule");
  }

  function removeClient(id){
    const r=clients.filter(c=>c.id!==id);
    const n=r.length?r:DEFAULT_CLIENTS;
    setClients(n);setActiveId(n[0].id);
  }

  // ── Derived ──
  const moSessions=useMemo(()=>{
    if(!cl) return [];
    return (cl.sessions||[]).filter(s=>{
      const d=new Date(s.date);
      return d.getFullYear()===viewYr&&d.getMonth()===viewMo;
    });
  },[cl,viewMo,viewYr]);

  const byDay=useMemo(()=>{
    const m={};
    moSessions.forEach(s=>{
      const d=parseInt(s.date.split("-")[2],10);
      if(!m[d]) m[d]=[];
      m[d].push(s);
    });
    return m;
  },[moSessions]);

  const billing=useMemo(()=>
    cl?computeBill(cl,viewYr,viewMo):{bill:0,baseBill:0,adjustment:0,breakdown:[],isFirst:false},
  [cl,viewYr,viewMo,clients]);

  const totalEarned=useMemo(()=>cl?getTotalEarned(cl):0,[cl,clients]);

  const paymentConfirmed=useMemo(()=>
    (cl?.confirmedPayments||[]).some(p=>p.year===viewYr&&p.month===viewMo),
  [cl,viewYr,viewMo]);

  const confirmedAmt=useMemo(()=>{
    const p=(cl?.confirmedPayments||[]).find(p=>p.year===viewYr&&p.month===viewMo);
    return p?p.amount:0;
  },[cl,viewYr,viewMo]);

  // Next month bill preview — driven by THIS month's rollovers
  const nextMonthPreview=useMemo(()=>{
    if(!cl) return {items:[],total:0};
    const rate=cl.rate||40;
    const items=[];
    let adj=0;
    const rollYou  =moSessions.filter(s=>s.status==="rollover_you");
    const rollCli  =moSessions.filter(s=>s.status==="rollover_cli");
    const reschedR =moSessions.filter(s=>s.status==="resched_rollover");
    if(rollYou.length){
      const amt=rollYou.length*rate;
      adj-=amt;
      items.push({label:`${rollYou.length} Rollover (You)`,sign:"−",amt,color:"#f59e0b"});
    }
    if(rollCli.length){
      const amt=rollCli.length*rate;
      adj-=amt;
      items.push({label:`${rollCli.length} Rollover (Client)`,sign:"−",amt,color:"#a78bfa"});
    }
    if(reschedR.length){
      const amt=reschedR.length*rate;
      adj+=amt;
      items.push({label:`${reschedR.length} Rescheduled Rollover`,sign:"+",amt,color:"#34d399"});
    }
    // Next month base
    const nextDate=new Date(viewYr,viewMo+1,1);
    const ny=nextDate.getFullYear(),nm=nextDate.getMonth();
    const nextBase=countScheduledSessions(cl,ny,nm)*(cl.rate||40);
    const total=Math.max(0,nextBase+adj);
    return{items,adj,nextBase,total,nextMonthName:MONTHS[nm]};
  },[moSessions,cl,viewYr,viewMo]);

  const locked  = useMemo(()=>cl?isMonthLocked(cl,viewYr,viewMo):false,[cl,viewYr,viewMo]);
  const grid    = useMemo(()=>buildGrid(viewYr,viewMo),[viewYr,viewMo]);
  const now     = new Date();
  const isCurMo = now.getMonth()===viewMo&&now.getFullYear()===viewYr;
  const selSess = selDay?(byDay[selDay]||[]):[];

  if(!cl) return <div style={{color:"#555",padding:40}}>Loading…</div>;

  // ── Style helpers ──
  const tabBtn=on=>({
    background:on?"#4a9eff18":"#141414",color:on?"#4a9eff":"#555",
    border:on?"1px solid #4a9eff30":"1px solid #1e1e1e",
    borderRadius:8,padding:"7px 14px",fontSize:12,cursor:"pointer",fontFamily:"inherit"
  });
  const btnP={background:"#4a9eff",color:"#000",border:"none",borderRadius:8,
    padding:"8px 16px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"};
  const btnD={background:"#ef444412",color:"#ef4444",border:"1px solid #ef444428",
    borderRadius:8,padding:"7px 14px",fontSize:12,cursor:"pointer",fontFamily:"inherit"};
  const inp={background:"#111",border:"1px solid #222",borderRadius:8,
    color:"#e8e8e8",padding:"8px 12px",fontSize:13,fontFamily:"inherit",width:"100%"};

  function openModal(type,prefill){
    setModal({type});setMDate(prefill||"");setMTime("09:00");setMNote("");
  }

  function srcLabel(s){
    if(s.source==="auto")          return "Regular session";
    if(s.source==="extra")         return "Extra session";
    if(s.source==="resched_rollover") return "Reschedule (Rollover)";
    if(s.source==="resched_late")  return "Reschedule (Late Cancel)";
    return s.source;
  }

  const modalInfo={
    extra:          {title:"Add Extra Session",        desc:"Adds +$"+cl.rate+" to next month's bill."},
    resched_rollover:{title:"Reschedule — Rollover",   desc:"Adds +$"+cl.rate+" back to next month's bill. Pick a new date."},
    resched_late:   {title:"Reschedule — Late Cancel", desc:"No billing effect. Just for your records. Pick a new date."},
  };

  const nextDate=new Date(viewYr,viewMo+1,1);
  const nextMoName=MONTHS[nextDate.getMonth()];

  return(
  <div style={{display:"flex",minHeight:"100vh",background:"#0f0f0f",
    fontFamily:"'DM Mono','Courier New',monospace",color:"#e8e8e8"}}>

    {/* ── Modal ── */}
    {modal&&(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.84)",
        display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}}
        onClick={()=>setModal(null)}>
        <div style={{background:"#1a1a1a",border:"1px solid #2a2a2a",
          borderRadius:14,padding:26,width:340}}
          onClick={e=>e.stopPropagation()}>
          <div style={{fontSize:15,fontWeight:700,color:"#fff",marginBottom:4}}>
            {modalInfo[modal.type]?.title}
          </div>
          <div style={{fontSize:11,color:"#555",marginBottom:20,lineHeight:1.6}}>
            {modalInfo[modal.type]?.desc}
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:10,color:"#444",letterSpacing:1,textTransform:"uppercase",marginBottom:5}}>Date</div>
            <input type="date" style={inp} value={mDate} onChange={e=>setMDate(e.target.value)}/>
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:10,color:"#444",letterSpacing:1,textTransform:"uppercase",marginBottom:5}}>Time</div>
            <input type="time" style={inp} value={mTime} onChange={e=>setMTime(e.target.value)}/>
          </div>
          <div style={{marginBottom:20}}>
            <div style={{fontSize:10,color:"#444",letterSpacing:1,textTransform:"uppercase",marginBottom:5}}>Note (optional)</div>
            <input style={inp} placeholder="e.g. makeup session" value={mNote}
              onChange={e=>setMNote(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&confirmAdd()}/>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button style={btnP} onClick={confirmAdd}>Add Session</button>
            <button style={{...tabBtn(false),cursor:"pointer"}} onClick={()=>setModal(null)}>Cancel</button>
          </div>
        </div>
      </div>
    )}

    {/* ── Sidebar ── */}
    <aside style={{width:224,minWidth:224,background:"#141414",
      borderRight:"1px solid #1a1a1a",padding:"22px 14px",
      display:"flex",flexDirection:"column",gap:4,flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
        <span style={{fontSize:26}}>💪</span>
        <span style={{fontSize:13,fontWeight:700,lineHeight:1.2,color:"#fff",letterSpacing:1}}>
          PT<br/>Scheduler
        </span>
      </div>
      <div style={{fontSize:10,color:"#22c97a",height:14,letterSpacing:1,
        transition:"opacity .5s",opacity:saveFlash?1:0}}>✓ Saved</div>

      <p style={{fontSize:9,letterSpacing:2,color:"#444",
        margin:"12px 0 5px",textTransform:"uppercase"}}>CLIENTS</p>

      {clients.map(c=>(
        <div key={c.id} className="hov"
          onClick={()=>{setActiveId(c.id);setTab("calendar");setSelDay(null);}}
          style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",
            borderRadius:8,cursor:"pointer",
            background:c.id===activeId?"#1e1e1e":"transparent",
            outline:c.id===activeId?"1px solid #2a2a2a":"none"}}>
          <span style={{width:26,height:26,borderRadius:6,background:"#4a9eff18",
            color:"#4a9eff",display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:12,fontWeight:700,flexShrink:0}}>{c.name[0].toUpperCase()}</span>
          <span style={{fontSize:13,flex:1,overflow:"hidden",
            textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</span>
        </div>
      ))}

      {showNC?(
        <div style={{background:"#1a1a1a",borderRadius:8,padding:10,marginTop:4}}>
          <input style={{width:"100%",background:"#111",border:"1px solid #222",
            borderRadius:6,color:"#e8e8e8",padding:"6px 8px",fontSize:12,
            fontFamily:"inherit",boxSizing:"border-box",marginBottom:6}}
            placeholder="Client name" value={ncName}
            onChange={e=>setNcName(e.target.value)} autoFocus/>
          <div style={{fontSize:10,color:"#444",letterSpacing:1,
            textTransform:"uppercase",marginBottom:4}}>Start Date</div>
          <input type="date" style={{width:"100%",background:"#111",border:"1px solid #222",
            borderRadius:6,color:"#e8e8e8",padding:"6px 8px",fontSize:12,
            fontFamily:"inherit",boxSizing:"border-box",marginBottom:6}}
            value={ncStart} onChange={e=>setNcStart(e.target.value)}/>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
            <span style={{color:"#444",fontSize:11}}>Rate $</span>
            <input type="number" min={1}
              style={{width:64,background:"#111",border:"1px solid #222",borderRadius:6,
                color:"#e8e8e8",padding:"5px 7px",fontSize:12,fontFamily:"inherit"}}
              value={ncRate} onChange={e=>setNcRate(Number(e.target.value))}/>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button style={{background:"#4a9eff",color:"#000",border:"none",borderRadius:6,
              padding:"5px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}
              onClick={addClient}>Add</button>
            <button style={{background:"#222",color:"#555",border:"none",borderRadius:6,
              padding:"5px 10px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}
              onClick={()=>setShowNC(false)}>Cancel</button>
          </div>
        </div>
      ):(
        <button onClick={()=>setShowNC(true)}
          style={{marginTop:8,background:"transparent",border:"1px dashed #222",
            borderRadius:8,color:"#333",padding:"8px 10px",fontSize:12,
            cursor:"pointer",fontFamily:"inherit",textAlign:"left",width:"100%"}}>
          + New Client
        </button>
      )}

      <button onClick={()=>exportCSV(clients)}
        style={{marginTop:6,background:"#1a1a1a",border:"1px solid #1e1e1e",
          borderRadius:8,color:"#444",padding:"8px 10px",fontSize:11,
          cursor:"pointer",fontFamily:"inherit",textAlign:"left",width:"100%"}}>
        ⬇ Export CSV
      </button>

      {/* Status legend */}
      <div style={{marginTop:"auto",paddingTop:16}}>
        <p style={{fontSize:9,letterSpacing:2,color:"#333",marginBottom:7,textTransform:"uppercase"}}>
          STATUS KEY
        </p>
        {Object.entries(STATUS).map(([k,v])=>(
          <div key={k} style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}>
            <span style={{width:7,height:7,borderRadius:"50%",flexShrink:0,background:v.color}}/>
            <span style={{fontSize:10,color:"#444"}}>{v.label}</span>
          </div>
        ))}
        <div style={{marginTop:10,fontSize:9,color:"#2a2a2a",lineHeight:1.7}}>
          Only Rollovers affect the bill.<br/>
          Everything else is for your records.
        </div>
      </div>
    </aside>

    {/* ── Main ── */}
    <main style={{flex:1,padding:"26px 30px",display:"flex",
      flexDirection:"column",gap:16,overflowY:"auto"}}>

      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",
        alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
        <div>
          <h1 style={{margin:0,fontSize:24,fontWeight:700,color:"#fff",letterSpacing:-.5}}>
            {cl.name}
          </h1>
          <p style={{margin:"3px 0 0",fontSize:12,color:"#555"}}>
            ${cl.rate}/session
            {cl.startDate&&<span> · Started {cl.startDate}</span>}
            {(cl.trainDays||[]).length>0&&
              <span style={{color:"#333"}}> · {(cl.trainDays||[]).map(td=>WEEKDAYS[td.wd]).join(", ")}</span>}
          </p>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button style={tabBtn(tab==="calendar")} onClick={()=>{setTab("calendar");setSelDay(null);}}>📅 Calendar</button>
          <button style={tabBtn(tab==="list")}     onClick={()=>{setTab("list");setSelDay(null);}}>☰ List</button>
          <button style={tabBtn(tab==="schedule")} onClick={()=>setTab("schedule")}>⚙ Schedule</button>
          {clients.length>1&&<button style={btnD} onClick={()=>removeClient(activeId)}>Remove</button>}
        </div>
      </div>

      {/* ── Billing cards ── */}
      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:12}}>

        {/* This month's bill */}
        <div style={{background:"#141414",border:"1px solid #22c97a28",
          borderRadius:12,padding:20}}>
          <div style={{fontSize:10,color:"#555",letterSpacing:1,
            textTransform:"uppercase",marginBottom:6}}>
            {MONTHS[viewMo]} {viewYr} — Upfront Bill
            {billing.isFirst&&
              <span style={{color:"#4a9eff",marginLeft:8,fontSize:9}}>FIRST MONTH</span>}
            {locked&&
              <span style={{color:"#ef4444",marginLeft:8,fontSize:9}}>🔒 LOCKED</span>}
          </div>
          <div style={{fontSize:42,fontWeight:700,color:"#22c97a",lineHeight:1,marginBottom:12}}>
            ${billing.bill}
          </div>

          {/* Breakdown */}
          <div style={{fontSize:11,lineHeight:2,marginBottom:14}}>
            <div style={{color:"#444"}}>
              {countScheduledSessions(cl,viewYr,viewMo)} sessions × ${cl.rate} = ${billing.baseBill}
            </div>
            {billing.breakdown.map((b,i)=>(
              <div key={i} style={{color:b.color}}>
                {b.sign} ${b.amt} — {b.label}
                {billing.prevMonthName&&
                  <span style={{color:"#333"}}> (from {billing.prevMonthName})</span>}
              </div>
            ))}
          </div>

          {/* Confirm payment */}
          {!paymentConfirmed&&billing.bill>0&&(
            <button onClick={()=>confirmPayment(billing.bill)}
              style={{background:"#22c97a",color:"#000",border:"none",
                borderRadius:8,padding:"10px 20px",fontSize:12,fontWeight:700,
                cursor:"pointer",fontFamily:"inherit"}}>
              ✓ Confirm Payment Received — ${billing.bill}
            </button>
          )}
          {paymentConfirmed&&(
            <div style={{fontSize:11,color:"#22c97a",background:"#22c97a12",
              borderRadius:8,padding:"8px 14px",display:"inline-block"}}>
              ✓ ${confirmedAmt} confirmed for {MONTHS[viewMo]}
            </div>
          )}
        </div>

        {/* Right column */}
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {/* Total earned */}
          <div style={{background:"#141414",border:"1px solid #1a1a1a",
            borderRadius:12,padding:18}}>
            <div style={{fontSize:9,color:"#333",letterSpacing:1,
              textTransform:"uppercase",marginBottom:6}}>Total Earned</div>
            <div style={{fontSize:30,fontWeight:700,color:"#22c97a"}}>${totalEarned}</div>
            <div style={{fontSize:10,color:"#2a2a2a",marginTop:2}}>all confirmed payments</div>
          </div>

          {/* Next month preview */}
          <div style={{background:"#141414",border:"1px solid #1a1a1a",
            borderRadius:12,padding:18,flex:1}}>
            <div style={{fontSize:9,color:"#333",letterSpacing:1,
              textTransform:"uppercase",marginBottom:6}}>
              {nextMoName} Preview
            </div>
            <div style={{fontSize:24,fontWeight:700,
              color:nextMonthPreview.items.length>0?"#e8e8e8":"#2a2a2a",marginBottom:8}}>
              ${nextMonthPreview.total}
            </div>
            <div style={{fontSize:10,color:"#333",marginBottom:6}}>
              {nextMonthPreview.nextBase} sessions × ${cl.rate} = ${nextMonthPreview.nextBase}
            </div>
            {nextMonthPreview.items.length===0?(
              <div style={{fontSize:10,color:"#2a2a2a"}}>No rollovers this month</div>
            ):nextMonthPreview.items.map((x,i)=>(
              <div key={i} style={{fontSize:10,color:x.color,lineHeight:1.9}}>
                {x.sign}${x.amt} {x.label}
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Month nav */}
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <button onClick={()=>{setSelDay(null);
          if(viewMo===0){setViewMo(11);setViewYr(y=>y-1);}else setViewMo(m=>m-1);}}
          style={{background:"#1a1a1a",border:"1px solid #1e1e1e",color:"#555",
            borderRadius:6,width:28,height:28,fontSize:16,cursor:"pointer",
            display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>‹</button>
        <span style={{fontSize:14,fontWeight:600,color:"#bbb",minWidth:150,textAlign:"center"}}>
          {MONTHS[viewMo]} {viewYr}
        </span>
        <button onClick={()=>{setSelDay(null);
          if(viewMo===11){setViewMo(0);setViewYr(y=>y+1);}else setViewMo(m=>m+1);}}
          style={{background:"#1a1a1a",border:"1px solid #1e1e1e",color:"#555",
            borderRadius:6,width:28,height:28,fontSize:16,cursor:"pointer",
            display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>›</button>

        {/* Lock/Unlock button for past months */}
        {(()=>{
          const isPast=viewYr<now.getFullYear()||(viewYr===now.getFullYear()&&viewMo<now.getMonth());
          if(!isPast) return null;
          return locked?(
            <button onClick={()=>unlockMonth(viewYr,viewMo)}
              style={{background:"#f59e0b18",color:"#f59e0b",border:"1px solid #f59e0b30",
                borderRadius:8,padding:"5px 12px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>
              🔓 Unlock Month
            </button>
          ):(
            <button onClick={()=>lockMonth(viewYr,viewMo)}
              style={{background:"#ef444412",color:"#ef4444",border:"1px solid #ef444428",
                borderRadius:8,padding:"5px 12px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>
              🔒 Lock Month
            </button>
          );
        })()}
      </div>

      {/* Locked banner */}
      {locked&&(
        <div style={{background:"#ef444408",border:"1px solid #ef444420",
          borderRadius:10,padding:"12px 16px",fontSize:12,color:"#ef4444",
          display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span>🔒 {MONTHS[viewMo]} {viewYr} is locked. Click "Unlock Month" to make changes.</span>
          <button onClick={()=>unlockMonth(viewYr,viewMo)}
            style={{background:"#f59e0b",color:"#000",border:"none",borderRadius:6,
              padding:"5px 12px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
            🔓 Unlock
          </button>
        </div>
      )}

      {/* ══ SCHEDULE TAB ══ */}
      {tab==="schedule"&&(
        <div style={{background:"#141414",border:"1px solid #1a1a1a",borderRadius:12,padding:22}}>
          <div style={{fontSize:14,fontWeight:700,color:"#ddd",marginBottom:6}}>
            Weekly Schedule — {cl.name}
          </div>
          <p style={{fontSize:12,color:"#333",marginBottom:18,lineHeight:1.7}}>
            Changes here only affect the current and future months.
            Past months are locked and will not be changed.
          </p>

          <div style={{marginBottom:20}}>
            <div style={{fontSize:11,color:"#555",letterSpacing:1,
              textTransform:"uppercase",marginBottom:6}}>Client Start Date</div>
            <input type="date"
              style={{background:"#111",border:"1px solid #222",borderRadius:8,
                color:"#e8e8e8",padding:"8px 12px",fontSize:13,fontFamily:"inherit"}}
              value={cl.startDate||""}
              onChange={e=>upd(activeId,c=>
                syncSessions({...c,startDate:e.target.value},viewYr,viewMo))}/>
          </div>

          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
            {WEEKDAYS.map((dayName,wd)=>{
              const td=(cl.trainDays||[]).find(t=>t.wd===wd);
              const on=!!td;
              return(
                <div key={wd} style={{display:"flex",alignItems:"center",gap:12,
                  padding:"10px 14px",borderRadius:10,
                  background:on?"#1a1a1a":"#111",
                  border:on?"1px solid #2a2a2a":"1px solid #161616"}}>
                  <div onClick={()=>toggleDay(wd)}
                    style={{width:58,textAlign:"center",padding:"6px 0",borderRadius:20,
                      fontWeight:700,fontSize:12,cursor:"pointer",userSelect:"none",
                      background:on?"#4a9eff":"#1e1e1e",color:on?"#000":"#333",
                      border:on?"1px solid #4a9eff":"1px solid #222"}}>
                    {dayName}
                  </div>
                  {on?(
                    <>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:11,color:"#444"}}>Time:</span>
                        <input type="time"
                          style={{background:"#111",border:"1px solid #222",borderRadius:6,
                            color:"#e8e8e8",padding:"5px 8px",fontSize:12,fontFamily:"inherit"}}
                          value={td.time} onChange={e=>setDayTime(wd,e.target.value)}/>
                      </div>
                      <div style={{marginLeft:"auto",fontSize:11,color:"#333"}}>
                        {datesInMonth(viewYr,viewMo,wd).length}× in {MONTHS[viewMo]}
                        <span style={{color:"#222",marginLeft:6}}>
                          ({datesInMonth(viewYr,viewMo,wd).join(", ")})
                        </span>
                      </div>
                    </>
                  ):(
                    <span style={{fontSize:11,color:"#222"}}>Click to enable</span>
                  )}
                </div>
              );
            })}
          </div>

          <div style={{borderTop:"1px solid #1e1e1e",paddingTop:18}}>
            <div style={{fontSize:13,fontWeight:700,color:"#ccc",marginBottom:10}}>Session Rate</div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:12,color:"#444"}}>$ per session:</span>
              <input type="number" min={1}
                style={{background:"#111",border:"1px solid #222",borderRadius:8,
                  color:"#e8e8e8",padding:"7px 12px",fontSize:13,fontFamily:"inherit",width:90}}
                value={cl.rate}
                onChange={e=>{
                  const rate=Number(e.target.value);
                  upd(activeId,c=>({...c,rate,
                    sessions:(c.sessions||[]).map(s=>{
                      const d=new Date(s.date);
                      const isPast=d.getFullYear()<now.getFullYear()||
                        (d.getFullYear()===now.getFullYear()&&d.getMonth()<now.getMonth());
                      return isPast||s.status!=="scheduled"?s:{...s,rate};
                    })}));
                }}/>
            </div>
          </div>
        </div>
      )}

      {/* ══ CALENDAR TAB ══ */}
      {tab==="calendar"&&(
        <>
          <div style={{background:"#141414",border:"1px solid #1a1a1a",
            borderRadius:12,overflow:"hidden"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",
              borderBottom:"1px solid #1a1a1a"}}>
              {WEEKDAYS.map(d=>(
                <div key={d} style={{padding:"9px 0",textAlign:"center",fontSize:9,
                  letterSpacing:1,color:"#2a2a2a",textTransform:"uppercase"}}>{d}</div>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
              {grid.map((day,i)=>{
                if(!day) return(
                  <div key={`e${i}`} style={{minHeight:90,borderRight:"1px solid #0d0d0d",
                    borderBottom:"1px solid #0d0d0d",background:"#0b0b0b"}}/>
                );
                const ds      = byDay[day]||[];
                const isToday = isCurMo&&day===now.getDate();
                const isSel   = day===selDay;
                const isFirst = day===1;
                return(
                  <div key={day} className="hov"
                    style={{minHeight:90,borderRight:"1px solid #0d0d0d",
                      borderBottom:"1px solid #0d0d0d",padding:"5px 6px",
                      display:"flex",flexDirection:"column",gap:3,cursor:"pointer",
                      background:isSel?"#1c2a3a":isFirst?"#141d14":
                                 ds.length?"#161616":"transparent",
                      outline:isSel?"1px solid #4a9eff28":
                              isFirst?"1px solid #22c97a18":"none",
                      opacity:locked?0.6:1}}
                    onClick={()=>setSelDay(day===selDay?null:day)}>
                    <div style={{display:"flex",alignItems:"center",
                      justifyContent:"space-between"}}>
                      <span style={isToday
                        ?{fontSize:11,fontWeight:700,color:"#4a9eff",background:"#4a9eff18",
                          borderRadius:4,padding:"1px 4px",display:"inline-block"}
                        :isSel
                          ?{fontSize:11,fontWeight:700,color:"#000",background:"#4a9eff",
                            borderRadius:4,padding:"1px 4px",display:"inline-block"}
                          :{fontSize:11,fontWeight:600,color:ds.length?"#777":"#2a2a2a"}}>
                        {day}
                      </span>
                      {isFirst&&<span style={{fontSize:8,color:"#22c97a",fontWeight:700}}>BILL</span>}
                      {locked&&day===1&&<span style={{fontSize:8,color:"#ef4444"}}>🔒</span>}
                    </div>
                    {isFirst&&(
                      <div style={{fontSize:10,fontWeight:700,color:"#22c97a",
                        background:"#22c97a12",borderRadius:3,padding:"2px 5px"}}>
                        ${billing.bill}{paymentConfirmed&&" ✓"}
                      </div>
                    )}
                    {ds.map(s=>(
                      <div key={s.id} style={{fontSize:9,borderRadius:3,padding:"2px 5px",
                        fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                        background:STATUS[s.status].color+"18",color:STATUS[s.status].color}}>
                        {s.time} · {STATUS[s.status].short}
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Day detail panel */}
          {selDay&&(
            <div style={{background:"#141414",border:"1px solid #222",
              borderRadius:12,padding:20}}>
              <div style={{display:"flex",justifyContent:"space-between",
                alignItems:"flex-start",marginBottom:16,flexWrap:"wrap",gap:10}}>
                <div>
                  <div style={{fontSize:15,fontWeight:700,color:"#fff"}}>
                    {WEEKDAYS[new Date(viewYr,viewMo,selDay).getDay()]},&nbsp;
                    {MONTHS[viewMo]} {selDay}, {viewYr}
                  </div>
                  {selDay===1&&(
                    <div style={{marginTop:8}}>
                      <div style={{fontSize:13,color:"#22c97a",fontWeight:600,marginBottom:8}}>
                        💰 {MONTHS[viewMo]} upfront bill: ${billing.bill}
                        {billing.isFirst&&<span style={{fontSize:10,color:"#4a9eff",marginLeft:8}}>(first month)</span>}
                      </div>
                      {!paymentConfirmed&&billing.bill>0&&(
                        <button onClick={()=>confirmPayment(billing.bill)}
                          style={{background:"#22c97a",color:"#000",border:"none",
                            borderRadius:8,padding:"9px 18px",fontSize:12,fontWeight:700,
                            cursor:"pointer",fontFamily:"inherit"}}>
                          ✓ Confirm Payment Received — ${billing.bill}
                        </button>
                      )}
                      {paymentConfirmed&&(
                        <div style={{fontSize:11,color:"#22c97a",background:"#22c97a12",
                          borderRadius:8,padding:"7px 12px",display:"inline-block"}}>
                          ✓ ${confirmedAmt} confirmed for {MONTHS[viewMo]}
                        </div>
                      )}
                    </div>
                  )}
                </div>

                {/* Action buttons — only show if not locked */}
                {!locked&&(
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <button style={btnP}
                      onClick={()=>openModal("extra",makeDateStr(viewYr,viewMo,selDay))}>
                      + Add Session
                    </button>
                    <button style={{...btnP,background:"#34d399"}}
                      onClick={()=>openModal("resched_rollover",makeDateStr(viewYr,viewMo,selDay))}>
                      ↩ Reschedule Rollover
                    </button>
                    <button style={{...btnP,background:"#818cf8"}}
                      onClick={()=>openModal("resched_late",makeDateStr(viewYr,viewMo,selDay))}>
                      ↩ Reschedule Late Cancel
                    </button>
                  </div>
                )}
              </div>

              {selSess.length===0?(
                <div style={{color:"#222",fontSize:12,padding:"6px 0"}}>
                  No sessions on this day.
                  {(cl.trainDays||[]).length===0&&" Set training days in ⚙ Schedule."}
                </div>
              ):selSess.map(s=>{
                const meta=STATUS[s.status];
                return(
                  <div key={s.id} style={{marginBottom:16}}>
                    <div style={{fontSize:9,color:"#2a2a2a",letterSpacing:1,
                      textTransform:"uppercase",marginBottom:6}}>
                      {srcLabel(s)}{s.note&&` — ${s.note}`}
                      {meta.billing!==0&&(
                        <span style={{color:meta.billing>0?"#22c97a":"#f59e0b",marginLeft:8}}>
                          {meta.billing>0?"+":"-"}${cl.rate} → {nextMoName}
                        </span>
                      )}
                    </div>
                    <div style={{display:"flex",alignItems:"center",
                      background:"#111",border:"1px solid #1a1a1a",
                      borderRadius:10,overflow:"hidden"}}>
                      <div style={{width:3,alignSelf:"stretch",background:meta.color,flexShrink:0}}/>
                      <div style={{flex:1,display:"flex",alignItems:"center",
                        gap:10,flexWrap:"wrap",padding:"11px 12px"}}>
                        <span style={{fontSize:13,color:"#666",fontWeight:600}}>{s.time}</span>
                        <span style={{fontSize:12,fontWeight:700,color:meta.color,
                          background:meta.color+"14",borderRadius:20,padding:"2px 10px"}}>
                          {meta.label}
                        </span>
                        <span style={{fontSize:13,fontWeight:700,color:"#22c97a",
                          marginLeft:"auto"}}>${s.rate||cl.rate}</span>
                      </div>
                      <a href={gcalUrl(s,cl.name)} target="_blank" rel="noreferrer"
                        style={{fontSize:18,textDecoration:"none",padding:"0 10px",
                          display:"flex",alignItems:"center"}}>📅</a>
                      {!locked&&(
                        <button onClick={()=>delSession(s.id)}
                          style={{background:"transparent",border:"none",color:"#222",
                            fontSize:14,cursor:"pointer",padding:"0 12px 0 0",
                            fontFamily:"inherit"}}>✕</button>
                      )}
                    </div>

                    {/* Status buttons — only if not locked */}
                    {!locked&&(
                      <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                        {Object.entries(STATUS).map(([k,v])=>(
                          <button key={k} onClick={()=>setStatus(s.id,k)}
                            style={{fontSize:10,borderRadius:20,padding:"5px 13px",
                              fontWeight:600,cursor:"pointer",fontFamily:"inherit",
                              border:"1px solid",transition:"all .12s",
                              background:s.status===k?v.color+"28":"transparent",
                              color:s.status===k?v.color:"#2a2a2a",
                              borderColor:s.status===k?v.color+"50":"#1e1e1e"}}>
                            {v.label}
                          </button>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {/* Info box */}
          <div style={{background:"#f59e0b08",border:"1px solid #f59e0b15",
            borderRadius:10,padding:"12px 16px",fontSize:12,lineHeight:1.9,color:"#444"}}>
            <strong style={{color:"#f59e0b"}}>Billing: </strong>
            Each month's bill = sessions × rate (fixed).
            Only <span style={{color:"#f59e0b"}}>Rollovers</span> change the bill (−$rate next month).
            <span style={{color:"#34d399"}}> Reschedule Rollover</span> adds +$rate back.
            Everything else is for your records only.
            Past months are <span style={{color:"#ef4444"}}>🔒 locked</span> — use Unlock to edit.
          </div>
        </>
      )}

      {/* ══ LIST TAB ══ */}
      {tab==="list"&&(
        <>
          {!locked&&(
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:4}}>
              <button style={btnP} onClick={()=>openModal("extra","")}>+ Add Session</button>
              <button style={{...btnP,background:"#34d399"}}
                onClick={()=>openModal("resched_rollover","")}>↩ Reschedule Rollover</button>
              <button style={{...btnP,background:"#818cf8"}}
                onClick={()=>openModal("resched_late","")}>↩ Reschedule Late Cancel</button>
            </div>
          )}

          {moSessions.length===0?(
            <div style={{color:"#222",fontSize:13,padding:"24px 0",textAlign:"center"}}>
              No sessions for {MONTHS[viewMo]}.
              {(cl.trainDays||[]).length===0
                ?" Set training days in ⚙ Schedule."
                :" Make sure your start date is set in ⚙ Schedule."}
            </div>
          ):moSessions.map(s=>{
            const meta=STATUS[s.status];
            const d=new Date(s.date+"T12:00:00");
            return(
              <div key={s.id} style={{marginBottom:12}}>
                <div style={{fontSize:9,color:"#2a2a2a",letterSpacing:1,
                  textTransform:"uppercase",marginBottom:4}}>
                  {srcLabel(s)}{s.note&&` — ${s.note}`}
                  {meta.billing!==0&&(
                    <span style={{color:meta.billing>0?"#22c97a":"#f59e0b",marginLeft:8}}>
                      {meta.billing>0?"+":"-"}${cl.rate} → {nextMoName}
                    </span>
                  )}
                </div>
                <div style={{display:"flex",alignItems:"center",
                  background:"#111",border:"1px solid #1a1a1a",
                  borderRadius:10,overflow:"hidden"}}>
                  <div style={{width:3,alignSelf:"stretch",background:meta.color,flexShrink:0}}/>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",
                    width:40,padding:"10px 0",flexShrink:0}}>
                    <span style={{fontSize:8,color:"#333",letterSpacing:1,textTransform:"uppercase"}}>
                      {WEEKDAYS[d.getDay()]}
                    </span>
                    <span style={{fontSize:20,fontWeight:700,color:"#999",lineHeight:1}}>
                      {d.getDate()}
                    </span>
                  </div>
                  <div style={{flex:1,display:"flex",alignItems:"center",
                    gap:10,flexWrap:"wrap",padding:"10px 8px"}}>
                    <span style={{fontSize:12,color:"#555"}}>{s.time}</span>
                    <span style={{fontSize:11,borderRadius:20,padding:"2px 8px",
                      fontWeight:600,background:meta.color+"18",color:meta.color}}>
                      {meta.label}
                    </span>
                  </div>
                  <div style={{fontSize:14,fontWeight:700,color:"#22c97a",
                    flexShrink:0,paddingRight:4}}>${s.rate||cl.rate}</div>
                  <div style={{display:"flex",alignItems:"center",gap:6,
                    padding:"0 12px",flexShrink:0}}>
                    <a href={gcalUrl(s,cl.name)} target="_blank" rel="noreferrer"
                      style={{fontSize:16,textDecoration:"none",padding:2,
                        display:"flex",alignItems:"center"}}>📅</a>
                    {!locked&&(
                      <button onClick={()=>delSession(s.id)}
                        style={{background:"transparent",border:"none",color:"#222",
                          fontSize:13,cursor:"pointer",padding:3,fontFamily:"inherit"}}>✕</button>
                    )}
                  </div>
                </div>
                {!locked&&(
                  <div style={{display:"flex",gap:5,marginTop:6,flexWrap:"wrap"}}>
                    {Object.entries(STATUS).map(([k,v])=>(
                      <button key={k} onClick={()=>setStatus(s.id,k)}
                        style={{fontSize:9,borderRadius:20,padding:"4px 11px",
                          fontWeight:600,cursor:"pointer",fontFamily:"inherit",
                          border:"1px solid",
                          background:s.status===k?v.color+"22":"transparent",
                          color:s.status===k?v.color:"#222",
                          borderColor:s.status===k?v.color+"40":"#1a1a1a"}}>
                        {v.short}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </>
      )}

    </main>
  </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
